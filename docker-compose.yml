services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-password}
      POSTGRES_DB: livecode
      PGPORT: 5432
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432" 

  redis:
    image: redis:alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-password}"]
    ports:
      - "127.0.0.1:6379:6379"
  caddy:
    image: caddy:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
  api:
    build: .
    environment:
      DATABASE_URL: postgres://postgres:${DATABASE_PASSWORD:-password}@db:5432/livecode
      REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379
      SANDBOX_MAX_CONTAINERS: ${SANDBOX_MAX_CONTAINERS:-20}
      SANDBOX_MAX_CONTAINERS_PER_CLIENT: ${SANDBOX_MAX_CONTAINERS_PER_CLIENT:-2}
      SANDBOX_MEMORY_BYTES: ${SANDBOX_MEMORY_BYTES:-134217728}
      SANDBOX_NANO_CPUS: ${SANDBOX_NANO_CPUS:-500000000}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
volumes:
  db-data:
  caddy_data:
  caddy_config: